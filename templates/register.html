{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 card p-4 shadow-sm">
        <h3 class="mb-3">Account Registration</h3>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="mb-3"><label>Contact Details</label><input type="text" name="contact" class="form-control"></div>
            <div class="mb-3">
                <label>Register As</label>
                <select name="role" class="form-select">
                    <option value="user">Trekker (User)</option>
                    <option value="staff">Trek Guide (Staff)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}
